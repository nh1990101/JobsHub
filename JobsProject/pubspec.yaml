name: job_hub
description: A cross-platform recruitment app built with Flutter.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 网络请求
  dio: ^5.3.0

  # 状态管理
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0

  # 本地存储
  shared_preferences: ^2.2.0

  # 路由
  go_router: ^10.0.0

  # 本地化
  intl: ^0.19.0

  # UI 响应式布局
  flutter_screenutil: ^5.9.0

  # JSON 序列化
  json_annotation: ^4.8.0

  # 设备信息
  device_info_plus: ^9.0.0

  # URL 启动器
  url_launcher: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
