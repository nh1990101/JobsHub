<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobHub API 测试工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .status {
            display: inline-block;
            background: #4caf50;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 10px;
        }

        .status.error {
            background: #f44336;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            color: #555;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 13px;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn.secondary {
            background: #999;
        }

        .btn.secondary:hover {
            background: #777;
        }

        .response {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            margin-top: 15px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            max-height: 300px;
            overflow-y: auto;
            color: #333;
        }

        .response.success {
            background: #f1f8f4;
            border-color: #4caf50;
            color: #2e7d32;
        }

        .response.error {
            background: #fef5f5;
            border-color: #f44336;
            color: #c62828;
        }

        .response pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .token-display {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 5px;
            padding: 10px;
            margin-top: 10px;
            font-size: 12px;
        }

        .token-display code {
            display: block;
            background: white;
            padding: 8px;
            border-radius: 3px;
            margin-top: 5px;
            word-break: break-all;
            font-family: 'Courier New', monospace;
        }

        .copy-btn {
            background: #2196f3;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            font-size: 11px;
            cursor: pointer;
            margin-top: 5px;
        }

        .copy-btn:hover {
            background: #1976d2;
        }

        .section {
            margin-bottom: 40px;
        }

        .section-title {
            color: white;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .info-box {
            background: rgba(255, 255, 255, 0.1);
            border-left: 4px solid white;
            padding: 15px;
            border-radius: 5px;
            color: white;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .info-box strong {
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🚀 JobHub API 测试工具</h1>
            <p>实时测试 JobHub 后台 API 接口</p>
            <div class="status" id="status">检查服务中...</div>
        </div>

        <!-- Info Box -->
        <div class="info-box">
            <strong>💡 使用说明</strong>
            <p>1. 先在"用户认证"部分注册或登录用户</p>
            <p>2. 登录后会获得 Token，自动填充到其他请求</p>
            <p>3. 使用 Token 访问受保护的 API</p>
        </div>

        <!-- 用户认证 -->
        <div class="section">
            <div class="section-title">👤 用户认证</div>
            <div class="grid">
                <!-- 注册 -->
                <div class="card">
                    <h2>注册用户</h2>
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="email" id="registerEmail" placeholder="user@example.com">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="registerPassword" placeholder="password123">
                    </div>
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="registerName" placeholder="用户名">
                    </div>
                    <button class="btn" onclick="register()">注册</button>
                    <div class="response" id="registerResponse"></div>
                </div>

                <!-- 登录 -->
                <div class="card">
                    <h2>用户登录</h2>
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="email" id="loginEmail" placeholder="user@example.com">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="loginPassword" placeholder="password123">
                    </div>
                    <button class="btn" onclick="login()">登录</button>
                    <div class="response" id="loginResponse"></div>
                    <div class="token-display" id="tokenDisplay" style="display: none;">
                        <strong>✓ 登录成功！Token 已保存</strong>
                        <code id="tokenCode"></code>
                        <button class="copy-btn" onclick="copyToken()">复制 Token</button>
                    </div>
                </div>

                <!-- 获取个人信息 -->
                <div class="card">
                    <h2>获取个人信息</h2>
                    <button class="btn" onclick="getProfile()">获取信息</button>
                    <div class="response" id="profileResponse"></div>
                </div>
            </div>
        </div>

        <!-- 职位管理 -->
        <div class="section">
            <div class="section-title">💼 职位管理</div>
            <div class="grid">
                <!-- 获取职位列表 -->
                <div class="card">
                    <h2>获取职位列表</h2>
                    <div class="form-group">
                        <label>国家 ID（可选）</label>
                        <input type="number" id="jobCountry" placeholder="留空获取所有">
                    </div>
                    <div class="form-group">
                        <label>分页 - 数量</label>
                        <input type="number" id="jobLimit" value="20">
                    </div>
                    <div class="form-group">
                        <label>分页 - 偏移</label>
                        <input type="number" id="jobOffset" value="0">
                    </div>
                    <button class="btn" onclick="getJobs()">获取列表</button>
                    <div class="response" id="jobsResponse"></div>
                </div>

                <!-- 获取职位详情 -->
                <div class="card">
                    <h2>获取职位详情</h2>
                    <div class="form-group">
                        <label>职位 ID</label>
                        <input type="number" id="jobDetailId" placeholder="1" value="1">
                    </div>
                    <button class="btn" onclick="getJobDetail()">获取详情</button>
                    <div class="response" id="jobDetailResponse"></div>
                </div>

                <!-- 创建职位 -->
                <div class="card">
                    <h2>创建职位</h2>
                    <div class="form-group">
                        <label>职位标题</label>
                        <input type="text" id="createJobTitle" placeholder="职位标题">
                    </div>
                    <div class="form-group">
                        <label>公司名称</label>
                        <input type="text" id="createJobCompany" placeholder="公司名称">
                    </div>
                    <div class="form-group">
                        <label>薪资范围</label>
                        <input type="text" id="createJobSalary" placeholder="15k-25k">
                    </div>
                    <div class="form-group">
                        <label>工作地点</label>
                        <input type="text" id="createJobLocation" placeholder="北京">
                    </div>
                    <button class="btn" onclick="createJob()">创建</button>
                    <div class="response" id="createJobResponse"></div>
                </div>
            </div>
        </div>

        <!-- 国家管理 -->
        <div class="section">
            <div class="section-title">🌍 国家管理</div>
            <div class="grid">
                <!-- 获取国家列表 -->
                <div class="card">
                    <h2>获取国家列表</h2>
                    <button class="btn" onclick="getCountries()">获取列表</button>
                    <div class="response" id="countriesResponse"></div>
                </div>

                <!-- 获取国家详情 -->
                <div class="card">
                    <h2>获取国家详情</h2>
                    <div class="form-group">
                        <label>国家 ID</label>
                        <input type="number" id="countryDetailId" placeholder="1" value="1">
                    </div>
                    <button class="btn" onclick="getCountryDetail()">获取详情</button>
                    <div class="response" id="countryDetailResponse"></div>
                </div>

                <!-- 创建国家 -->
                <div class="card">
                    <h2>创建国家</h2>
                    <div class="form-group">
                        <label>国家名称</label>
                        <input type="text" id="createCountryName" placeholder="国家名称">
                    </div>
                    <div class="form-group">
                        <label>国家代码</label>
                        <input type="text" id="createCountryCode" placeholder="XX">
                    </div>
                    <button class="btn" onclick="createCountry()">创建</button>
                    <div class="response" id="createCountryResponse"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let token = localStorage.getItem('jobhub_token') || '';

        // 检查服务状态
        async function checkStatus() {
            try {
                const response = await fetch(`${API_URL}/health`);
                if (response.ok) {
                    document.getElementById('status').textContent = '✓ 服务运行中';
                    document.getElementById('status').classList.remove('error');
                } else {
                    throw new Error('服务不可用');
                }
            } catch (error) {
                document.getElementById('status').textContent = '✗ 服务离线';
                document.getElementById('status').classList.add('error');
            }
        }

        // 显示响应
        function showResponse(elementId, data, isError = false) {
            const element = document.getElementById(elementId);
            element.textContent = JSON.stringify(data, null, 2);
            element.className = `response ${isError ? 'error' : 'success'}`;
        }

        // 注册
        async function register() {
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const name = document.getElementById('registerName').value;

            if (!email || !password || !name) {
                showResponse('registerResponse', { error: '请填写所有字段' }, true);
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, name })
                });
                const data = await response.json();
                showResponse('registerResponse', data, !response.ok);
            } catch (error) {
                showResponse('registerResponse', { error: error.message }, true);
            }
        }

        // 登录
        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showResponse('loginResponse', { error: '请填写邮箱和密码' }, true);
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();

                if (response.ok && data.token) {
                    token = data.token;
                    localStorage.setItem('jobhub_token', token);
                    showResponse('loginResponse', data);
                    document.getElementById('tokenDisplay').style.display = 'block';
                    document.getElementById('tokenCode').textContent = token;
                } else {
                    showResponse('loginResponse', data, true);
                }
            } catch (error) {
                showResponse('loginResponse', { error: error.message }, true);
            }
        }

        // 复制 Token
        function copyToken() {
            const token = document.getElementById('tokenCode').textContent;
            navigator.clipboard.writeText(token).then(() => {
                alert('Token 已复制到剪贴板');
            });
        }

        // 获取个人信息
        async function getProfile() {
            if (!token) {
                showResponse('profileResponse', { error: '请先登录' }, true);
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/profile`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                showResponse('profileResponse', data, !response.ok);
            } catch (error) {
                showResponse('profileResponse', { error: error.message }, true);
            }
        }

        // 获取职位列表
        async function getJobs() {
            const country = document.getElementById('jobCountry').value;
            const limit = document.getElementById('jobLimit').value;
            const offset = document.getElementById('jobOffset').value;

            let url = `${API_URL}/jobs?limit=${limit}&offset=${offset}`;
            if (country) url += `&country=${country}`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                showResponse('jobsResponse', data, !response.ok);
            } catch (error) {
                showResponse('jobsResponse', { error: error.message }, true);
            }
        }

        // 获取职位详情
        async function getJobDetail() {
            const id = document.getElementById('jobDetailId').value;
            if (!id) {
                showResponse('jobDetailResponse', { error: '请输入职位 ID' }, true);
                return;
            }

            try {
                const response = await fetch(`${API_URL}/jobs/${id}`);
                const data = await response.json();
                showResponse('jobDetailResponse', data, !response.ok);
            } catch (error) {
                showResponse('jobDetailResponse', { error: error.message }, true);
            }
        }

        // 创建职位
        async function createJob() {
            if (!token) {
                showResponse('createJobResponse', { error: '请先登录' }, true);
                return;
            }

            const title = document.getElementById('createJobTitle').value;
            const company = document.getElementById('createJobCompany').value;
            const salary = document.getElementById('createJobSalary').value;
            const location = document.getElementById('createJobLocation').value;

            if (!title || !company || !salary || !location) {
                showResponse('createJobResponse', { error: '请填写所有字段' }, true);
                return;
            }

            try {
                const response = await fetch(`${API_URL}/jobs`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        title,
                        description: '职位描述',
                        requirements: '职位要求',
                        company_name: company,
                        location,
                        salary,
                        weight: 50,
                        country_id: 1
                    })
                });
                const data = await response.json();
                showResponse('createJobResponse', data, !response.ok);
            } catch (error) {
                showResponse('createJobResponse', { error: error.message }, true);
            }
        }

        // 获取国家列表
        async function getCountries() {
            try {
                const response = await fetch(`${API_URL}/countries`);
                const data = await response.json();
                showResponse('countriesResponse', data, !response.ok);
            } catch (error) {
                showResponse('countriesResponse', { error: error.message }, true);
            }
        }

        // 获取国家详情
        async function getCountryDetail() {
            const id = document.getElementById('countryDetailId').value;
            if (!id) {
                showResponse('countryDetailResponse', { error: '请输入国家 ID' }, true);
                return;
            }

            try {
                const response = await fetch(`${API_URL}/countries/${id}`);
                const data = await response.json();
                showResponse('countryDetailResponse', data, !response.ok);
            } catch (error) {
                showResponse('countryDetailResponse', { error: error.message }, true);
            }
        }

        // 创建国家
        async function createCountry() {
            if (!token) {
                showResponse('createCountryResponse', { error: '请先登录' }, true);
                return;
            }

            const name = document.getElementById('createCountryName').value;
            const code = document.getElementById('createCountryCode').value;

            if (!name || !code) {
                showResponse('createCountryResponse', { error: '请填写所有字段' }, true);
                return;
            }

            try {
                const response = await fetch(`${API_URL}/countries`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ name, code })
                });
                const data = await response.json();
                showResponse('createCountryResponse', data, !response.ok);
            } catch (error) {
                showResponse('createCountryResponse', { error: error.message }, true);
            }
        }

        // 页面加载时检查状态
        checkStatus();
        setInterval(checkStatus, 5000);
    </script>
</body>
</html>
